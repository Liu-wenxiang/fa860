default:
  image: python:3.12-slim
  tags:
    - docker

stages:
  - test
  - release
  - sync

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

cache:
  paths:
    - .cache/pip

before_script:
  - sed -i 's|http://deb.debian.org/debian|https://mirrors.tuna.tsinghua.edu.cn/debian|g; s|http://security.debian.org/debian-security|https://mirrors.tuna.tsinghua.edu.cn/debian-security|g' /etc/apt/sources.list.d/debian.sources
  - apt-get update
  - apt-get install -y --no-install-recommends git libhidapi-dev openssh-client
  - python -m pip install --upgrade pip
  - pip install -e .[dev]

test:
  stage: test
  script:
    - pytest

release_tag:
  stage: release
  needs:
    - test
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "gitlab-ci@local"
    - git remote remove origin-ci || true
    - git remote add origin-ci "${GITLAB_PUSH_URL:-$CI_REPOSITORY_URL}"
    - git fetch --tags origin-ci
    - VERSION=$(python -c "import json, pathlib; print(json.loads(pathlib.Path('custom_components/fa860/manifest.json').read_text(encoding='utf-8'))['version'])")
    - TAG="v$VERSION"
    - |
      if git rev-parse "$TAG" >/dev/null 2>&1; then
        echo "Tag $TAG already exists, skipping"
        exit 0
      fi
    - git tag -a "$TAG" "$CI_COMMIT_SHA" -m "Release $TAG"
    - git push origin-ci "$TAG"

sync_github:
  stage: sync
  needs:
    - release_tag
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $GITHUB_PUSH_URL"
  before_script:
    - sed -i 's|http://deb.debian.org/debian|https://mirrors.tuna.tsinghua.edu.cn/debian|g; s|http://security.debian.org/debian-security|https://mirrors.tuna.tsinghua.edu.cn/debian-security|g' /etc/apt/sources.list.d/debian.sources
    - apt-get update
    - apt-get install -y --no-install-recommends git openssh-client
  script:
    - git config --global user.name "GitLab CI"
    - git config --global user.email "gitlab-ci@local"
    - git remote remove github-ci || true
    - git remote add github-ci "$GITHUB_PUSH_URL"
    - git push github-ci HEAD:$CI_COMMIT_BRANCH
    - git push github-ci --tags
