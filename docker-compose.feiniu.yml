services:
  fa860-bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: fa860-bridge
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    environment:
      PYTHONUNBUFFERED: "1"
